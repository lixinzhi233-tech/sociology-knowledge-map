<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识宇宙</title>
<style>
/* ── RESET ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 100%; height: 100%;
  background: #080810;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  overflow-y: auto;
  -webkit-font-smoothing: antialiased;
  color: #fff;
}

/* ── STARS CANVAS ───────────────────────────────────────────────────────────── */
#starsCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  transition: transform 0.2s ease;
}

/* ── PAGE WRAPPER ───────────────────────────────────────────────────────────── */
#page {
  position: relative;
  min-height: 100vh;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
#page.exit {
  animation: pageExit 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes pageExit {
  from { opacity: 1; transform: translateY(0);     }
  to   { opacity: 0; transform: translateY(-40px); }
}

/* ── BACKGROUND HALOS ───────────────────────────────────────────────────────── */
.halo {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.15;
}
@keyframes haloBreath {
  from { transform: scale(1);    }
  to   { transform: scale(1.08); }
}
.h1 { width:520px; height:520px; background:radial-gradient(circle,#1a1a4a 0%,transparent 70%); filter:blur(88px);  top:4%;    left:4%;   animation:haloBreath  9s ease-in-out infinite alternate; }
.h2 { width:620px; height:620px; background:radial-gradient(circle,#2a1a4a 0%,transparent 70%); filter:blur(110px); top:25%;   right:3%;  animation:haloBreath 12s ease-in-out infinite alternate; animation-delay:-4s;   }
.h3 { width:480px; height:480px; background:radial-gradient(circle,#1a1a4a 0%,transparent 70%); filter:blur(96px);  bottom:8%; left:12%;  animation:haloBreath 14s ease-in-out infinite alternate; animation-delay:-8s;   }
.h4 { width:560px; height:560px; background:radial-gradient(circle,#2a1a4a 0%,transparent 70%); filter:blur(100px); top:10%;   left:38%;  animation:haloBreath  8s ease-in-out infinite alternate; animation-delay:-2s;   }
.h5 { width:420px; height:420px; background:radial-gradient(circle,#1a1a4a 0%,transparent 70%); filter:blur(120px); bottom:18%; right:18%; animation:haloBreath 11s ease-in-out infinite alternate; animation-delay:-5.5s; }

/* ── CONTAINER ─────────────────────────────────────────────── */
#container {
  position: relative;
  z-index: 2;
  width: 600px;
  min-height: 100vh;
  text-align: center;
  transform-style: preserve-3d;
  will-change: transform;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
}

/* 每个区域内部 flex 居中 */
.section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
  transform: translateZ(1px);
  width: 100%;
}

.section-top {
  padding-top: 18vh;
  padding-bottom: 20px;
}

.section-mid {
  padding-bottom: 20px;
}

/* ── ENTRY ANIMATION KEYFRAMES ──────────────────────────────────────────────── */
@keyframes fadeUp20 {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0);     }
}
@keyframes fadeUp30 {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0);     }
}
@keyframes fadeUp15 {
  from { opacity: 0; transform: translateY(15px); }
  to   { opacity: 1; transform: translateY(0);     }
}
@keyframes fadeOnly {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── 1. 顶部小标签 ──────────────────────────────────────────────────────────── */
.label {
  font-size: 11px;
  letter-spacing: 5px;
  color: #444;
  font-weight: 400;
  margin-bottom: 18px;
  animation: fadeUp20 0.8s 0.1s cubic-bezier(0.4, 0, 0.2, 1) both;
}

/* ── 2. 标题包裹层（含星系背景）─────────────────────────────────────────────── */
.title-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── 3. 星系背景容器 ────────────────────────────────────────────────────────── */
.galaxy-bg {
  position: absolute;
  width: 400px;
  height: 400px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  pointer-events: none;
}

/* 中心光晕 */
.galaxy-halo {
  position: absolute;
  width: 200px;
  height: 200px;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255, 255, 255, 0.06) 0%,
    rgba(200, 210, 255, 0.03) 40%,
    transparent 70%);
  animation: galaxyHaloPulse 4s ease-in-out infinite alternate;
}
@keyframes galaxyHaloPulse {
  from { transform: translate(-50%, -50%) scale(1);    }
  to   { transform: translate(-50%, -50%) scale(1.15); }
}

/* 轨道圆环 */
.orbit {
  position: absolute;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.or1 {
  width: 160px; height: 160px;
  margin: -80px  0 0 -80px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  animation: orbitRing 12s linear infinite;
}
.or2 {
  width: 260px; height: 260px;
  margin: -130px 0 0 -130px;
  border: 1px solid rgba(255, 255, 255, 0.04);
  animation: orbitRing 20s linear infinite reverse;
}
.or3 {
  width: 380px; height: 380px;
  margin: -190px 0 0 -190px;
  border: 1px solid rgba(255, 255, 255, 0.025);
  animation: orbitRing 32s linear infinite;
}
@keyframes orbitRing {
  from { transform: rotate(0deg);   }
  to   { transform: rotate(360deg); }
}

/* 轨道光点 */
.dot {
  position: absolute;
  top: -1.5px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
}
.d1 {
  width: 3px; height: 3px;
  background: #fff;
  box-shadow: 0 0 6px rgba(255, 255, 255, 0.9),
              0 0 12px rgba(255, 255, 255, 0.4);
}
.d2 {
  width: 2px; height: 2px;
  background: #fff;
  box-shadow: 0 0 5px rgba(255, 255, 255, 0.8),
              0 0 10px rgba(255, 255, 255, 0.3);
}
.d3 {
  width: 2px; height: 2px;
  background: #fff;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.7),
              0 0  8px rgba(255, 255, 255, 0.25);
}

/* ── 4. 主标题 ────────────────────────────────────────────────────────────── */
@keyframes titleBreath {
  0%, 100% {
    text-shadow:
      0 0 120px rgba(100, 120, 255, 0.15),
      0 0  40px rgba(255, 255, 255, 0.05);
  }
  50% {
    text-shadow:
      0 0 160px rgba(100, 120, 255, 0.25),
      0 0  60px rgba(255, 255, 255, 0.08);
  }
}
.title {
  position: relative;
  z-index: 1;
  font-size: 88px;
  font-weight: 200;
  color: #ffffff;
  letter-spacing: 4px;
  text-shadow:
    0 0 120px rgba(100, 120, 255, 0.15),
    0 0  40px rgba(255, 255, 255, 0.05);
  animation:
    fadeUp30    0.9s  0.2s cubic-bezier(0.4, 0, 0.2, 1) both,
    titleBreath 4s    1.2s ease-in-out infinite;
}

/* ── 5. 副标题 ──────────────────────────────────────────────────────────────── */
.subtitle {
  font-size: 18px;
  color: #666;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: fadeUp20 0.8s 0.42s cubic-bezier(0.4, 0, 0.2, 1) both;
}

/* ── 6. 细分隔线 ─────────────────────────────────────────────────────────────── */
.divider {
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #333, transparent);
  margin: 0 auto 24px;
  animation: fadeOnly 0.6s 0.52s cubic-bezier(0.4, 0, 0.2, 1) both;
}

/* ── 7. 搜索框 ──────────────────────────────────────────────────────────────── */
.search-wrap {
  position: relative;
  width: 540px;
  margin: 0 auto;
  animation: fadeUp15 0.8s 0.62s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.search-icon {
  position: absolute;
  left: 19px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}
.search-input {
  width: 100%;
  height: 56px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 28px;
  padding: 0 24px 0 52px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.06),
    0 8px 32px rgba(0, 0, 0, 0.4),
    0 0 80px rgba(100, 120, 255, 0.04),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  font-size: 15px;
  color: #ccc;
  font-family: inherit;
  outline: none;
  transition: all 0.3s ease;
}
.search-input::placeholder { color: #333; }
.search-input:focus {
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.06);
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.12),
    0 8px 40px rgba(0, 0, 0, 0.5),
    0 0 100px rgba(100, 120, 255, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

/* ── 8. Pills 展开容器 ──────────────────────────────────────────────────────── */
.pills-expand {
  width: 540px;
  margin: 0 auto;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: translateY(8px);
  transition:
    max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
    opacity    0.35s cubic-bezier(0.4, 0, 0.2, 1),
    transform  0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.pills-expand.open {
  max-height: 220px;
  opacity: 1;
  transform: translateY(0);
}

.pills-hint {
  font-size: 12px;
  color: #444;
  text-align: center;
  margin: 14px 0 10px;
}

/* Pills 容器 */
.pills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding-bottom: 4px;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 100px;
  padding: 9px 18px;
  font-size: 13px;
  color: #555;
  font-family: inherit;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow:
    0 2px 12px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}
.pill:hover {
  background: rgba(255, 255, 255, 0.07);
  border-color: rgba(255, 255, 255, 0.15);
  color: #999;
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
  transform: translateY(-1px);
}

/* 学科彩点 */
.pdot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.p-soc .pdot { background: #4A90D9; box-shadow: 0 0 5px rgba(74,  144, 217, 0.7); }
.p-com .pdot { background: #E8844A; box-shadow: 0 0 5px rgba(232, 132, 74,  0.7); }
.p-phi .pdot { background: #9B6FD4; box-shadow: 0 0 5px rgba(155, 111, 212, 0.7); }
.p-eco .pdot { background: #52C49A; box-shadow: 0 0 5px rgba(82,  196, 154, 0.7); }
.p-new .pdot { background: #C49A52; box-shadow: 0 0 5px rgba(196, 154, 82,  0.7); }

/* ── 9. 跳过入口 ────────────────────────────────────────────────────────────── */
.skip {
  font-size: 15px;
  color: #555;
  letter-spacing: 0.3px;
  cursor: pointer;
  user-select: none;
  transition: color 0.3s ease, letter-spacing 0.3s ease;
  animation: fadeOnly 0.6s 0.88s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.skip:hover {
  color: #888;
  letter-spacing: 0.6px;
}

/* ── 10. AI 探索结果区域 ─────────────────────────────────────────────────────── */
#exploreResults {
  width: 540px;
  margin: 0 auto;
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: translateY(12px);
  transition:
    max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
    opacity    0.4s cubic-bezier(0.4, 0, 0.2, 1),
    transform  0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#exploreResults.open {
  max-height: 2000px;
  opacity: 1;
  transform: translateY(0);
}

/* 加载状态 */
.explore-loading {
  text-align: center;
  padding: 24px 0;
  font-size: 14px;
  color: #555;
}
.explore-loading .dots::after {
  content: '';
  animation: loadDots 1.5s ease-in-out infinite;
}
@keyframes loadDots {
  0%        { content: ''; }
  25%       { content: '.'; }
  50%       { content: '..'; }
  75%       { content: '...'; }
  100%      { content: ''; }
}

/* 结果摘要 */
.explore-summary {
  font-size: 13px;
  color: #777;
  text-align: center;
  margin: 16px 0 20px;
  line-height: 1.6;
}

/* 方向卡片 */
.direction-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}
.direction-title {
  font-size: 15px;
  font-weight: 500;
  color: #ccc;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.direction-title::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4A90D9;
  box-shadow: 0 0 8px rgba(74, 144, 217, 0.6);
  flex-shrink: 0;
}
.direction-desc {
  font-size: 12px;
  color: #666;
  line-height: 1.6;
  margin-bottom: 12px;
}

/* 学者卡片 */
.scholar-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  margin: 6px 0;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.scholar-card:hover {
  background: rgba(74, 144, 217, 0.08);
  border-color: rgba(74, 144, 217, 0.25);
  transform: translateX(4px);
}
.scholar-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #141426;
  border: 1.5px solid rgba(74, 144, 217, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.35);
  flex-shrink: 0;
  overflow: hidden;
  box-shadow: 0 0 12px rgba(74, 144, 217, 0.2);
}
.scholar-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.scholar-info {
  flex: 1;
  min-width: 0;
}
.scholar-name {
  font-size: 14px;
  font-weight: 500;
  color: #bbb;
  margin-bottom: 2px;
}
.scholar-reason {
  font-size: 11px;
  color: #666;
  line-height: 1.5;
}
.scholar-arrow {
  color: #4A90D9;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.scholar-card:hover .scholar-arrow {
  opacity: 1;
}

/* 底部分隔 */
.explore-divider {
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #333, transparent);
  margin: 20px auto 14px;
}
.explore-also {
  font-size: 13px;
  color: #555;
  text-align: center;
  cursor: pointer;
  transition: color 0.2s;
  padding-bottom: 8px;
}
.explore-also:hover {
  color: #888;
}

/* 错误状态 */
.explore-error {
  text-align: center;
  padding: 20px 0;
  font-size: 13px;
  color: #E85555;
}

.section-bot {
  padding: 30px 0 40px;
}
</style>
</head>
<body>

<!-- ── Stars canvas ── -->
<canvas id="starsCanvas"></canvas>

<!-- ── Page wrapper ── -->
<div id="page">

  <!-- 背景光晕 -->
  <div class="halo h1"></div>
  <div class="halo h2"></div>
  <div class="halo h3"></div>
  <div class="halo h4"></div>
  <div class="halo h5"></div>

  <!-- 主容器 -->
  <div id="container">

    <!-- ▌上：标题区 ── -->
    <div class="section section-top">

      <div class="label">KNOWLEDGE UNIVERSE</div>

      <div class="title-wrap">
        <div class="galaxy-bg">
          <div class="galaxy-halo"></div>
          <div class="orbit or1"><div class="dot d1"></div></div>
          <div class="orbit or2"><div class="dot d2"></div></div>
          <div class="orbit or3"><div class="dot d3"></div></div>
        </div>
        <h1 class="title">知识宇宙</h1>
      </div>
    </div>

    <!-- ▌中：交互区 ── -->
    <div class="section section-mid">

      <p class="subtitle">Follow Curiosity</p>
      <div class="divider"></div>

      <!-- 搜索框 -->
      <div class="search-wrap">
        <svg class="search-icon" width="17" height="17" viewBox="0 0 17 17" fill="none">
          <circle cx="7" cy="7" r="5.2" stroke="#444" stroke-width="1.35"/>
          <path d="M11 11L15.5 15.5" stroke="#444" stroke-width="1.35" stroke-linecap="round"/>
        </svg>
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="一个问题，开启一段思想之旅…"
          autocomplete="off"
        >
      </div>

      <!-- Pills -->
      <div class="pills-expand" id="pillsExpand">
        <p class="pills-hint">或者试试这些问题：</p>
        <div class="pills" id="pillsWrap">
          <!-- 场景引导 · 金 -->
          <button class="pill p-new" data-q="我刚进社会学专业，想了解这个学科在研究什么">
            <span class="pdot"></span>我刚进社会学，想了解这个学科
          </button>
          <button class="pill p-new" data-q="我想写一篇关于社交媒体社会影响的论文">
            <span class="pdot"></span>想写社交媒体影响的论文
          </button>
          <!-- 社会学 · 蓝 -->
          <button class="pill p-soc" data-q="为什么现代人越来越孤独？">
            <span class="pdot"></span>为什么现代人越来越孤独？
          </button>
          <button class="pill p-soc" data-q="权力是如何在社会中运作的？">
            <span class="pdot"></span>权力是如何在社会中运作的？
          </button>
          <!-- 传播学 · 橙 -->
          <button class="pill p-com" data-q="媒体真的能操控人的想法吗？">
            <span class="pdot"></span>媒体真的能操控人的想法吗？
          </button>
          <button class="pill p-com" data-q="为什么会有信息茧房？">
            <span class="pdot"></span>为什么会有信息茧房？
          </button>
          <!-- 经济学 · 绿 -->
          <button class="pill p-eco" data-q="贫富差距为什么越来越大？">
            <span class="pdot"></span>贫富差距为什么越来越大？
          </button>
        </div>
      </div>

      <!-- AI 探索结果区域 -->
      <div id="exploreResults"></div>

    </div>

    <!-- ▌下：次要入口 ── -->
    <div class="section section-bot">
      <div class="skip" id="skipBtn">
        已经知道想探索的领域？直接进入 →
      </div>
    </div>

  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════════════════
const API_BASE = 'https://knowledge-universe-api.lixinzhi233.workers.dev';

// Wikipedia avatar 快查表（和 map.html 里学者数据一致）
const scholarWiki = {
  weber:"Max_Weber", durkheim:"Émile_Durkheim", simmel:"Georg_Simmel",
  parsons:"Talcott_Parsons", merton:"Robert_K._Merton", mills:"C._Wright_Mills",
  bourdieu:"Pierre_Bourdieu", goffman:"Erving_Goffman", habermas:"Jürgen_Habermas",
  foucault:"Michel_Foucault", gramsci:"Antonio_Gramsci", lasswell:"Harold_Lasswell",
  lazarsfeld:"Paul_Lazarsfeld", mcluhan:"Marshall_McLuhan", hall:"Stuart_Hall_(cultural_theorist)",
  lippmann:"Walter_Lippmann", postman:"Neil_Postman", noelle_neumann:"Elisabeth_Noelle-Neumann",
  mccomb:"Maxwell_McCombs", giddens:"Anthony_Giddens", marx:"Karl_Marx",
  butler:"Judith_Butler", hooks:"Bell_hooks", collins:"Patricia_Hill_Collins",
  beauvoir:"Simone_de_Beauvoir", dubois:"W._E._B._Du_Bois"
};

// ════════════════════════════════════════════════════════════════════════════
// 1. STARS
// ════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('starsCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const stars = Array.from({ length: 200 }, () => ({
  x  : Math.random() * window.innerWidth,
  y  : Math.random() * window.innerHeight,
  r  : Math.random() * 0.5 + 0.5,
  a  : Math.random() * 0.17 + 0.08,
  vx : (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.1 + 0.05),
  vy : (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.1 + 0.05),
}));

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    if (s.x <= 0 || s.x >= canvas.width)  s.vx *= -1;
    if (s.y <= 0 || s.y >= canvas.height) s.vy *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ════════════════════════════════════════════════════════════════════════════
// 2. MOUSE PARALLAX
// ════════════════════════════════════════════════════════════════════════════
const container = document.getElementById('container');

document.addEventListener('mousemove', (e) => {
  const rect    = container.getBoundingClientRect();
  const centerX = rect.left + rect.width  / 2;
  const centerY = rect.top  + rect.height / 2;
  const mouseX  = e.clientX - centerX;
  const mouseY  = e.clientY - centerY;

  const maxTilt = 6;
  const tiltX   =  (mouseY / (window.innerHeight / 2)) * maxTilt;
  const tiltY   = -(mouseX / (window.innerWidth  / 2)) * maxTilt;

  container.style.transform  = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  container.style.transition = 'transform 0.1s ease';

  canvas.style.transform  = `translate(${-mouseX * 0.02}px, ${-mouseY * 0.02}px)`;
  canvas.style.transition = 'transform 0.15s ease';
});

document.addEventListener('mouseleave', () => {
  container.style.transform  = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
  container.style.transition = 'transform 0.6s ease';
  canvas.style.transform     = 'translate(0px, 0px)';
  canvas.style.transition    = 'transform 0.6s ease';
});

// ════════════════════════════════════════════════════════════════════════════
// 3. PILLS 展开 / 收起
// ════════════════════════════════════════════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const pillsExpand = document.getElementById('pillsExpand');

searchInput.addEventListener('focus', () => {
  pillsExpand.classList.add('open');
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => {
    if (document.activeElement !== searchInput) {
      pillsExpand.classList.remove('open');
    }
  }, 150);
});

// mousedown preventDefault：阻止 pill 点击时搜索框失去焦点
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('mousedown', (e) => e.preventDefault());
});

// ════════════════════════════════════════════════════════════════════════════
// 4. AI EXPLORE — 调用 /api/explore 并渲染结果
// ════════════════════════════════════════════════════════════════════════════
let isExploring = false;

async function callExplore(query) {
  if (!query || isExploring) return;
  isExploring = true;

  const resultsEl = document.getElementById('exploreResults');

  // 收起 pills
  pillsExpand.classList.remove('open');

  // 显示加载
  resultsEl.innerHTML = `
    <div class="explore-loading">
      正在为你分析探索方向<span class="dots"></span>
    </div>`;
  resultsEl.classList.add('open');

  // 滚动到结果区域
  setTimeout(() => resultsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);

  try {
    const resp = await fetch(`${API_BASE}/api/explore`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const data = await resp.json();

    // 解析 AI 返回
    const raw = data.content?.[0]?.text || '';
    let parsed;
    try { parsed = JSON.parse(raw); } catch { parsed = null; }

    if (!parsed?.directions?.length) {
      resultsEl.innerHTML = `<div class="explore-error">暂时无法分析，请换一种方式描述你的兴趣</div>`;
      isExploring = false;
      return;
    }

    // 渲染结果
    let html = '';

    if (parsed.summary) {
      html += `<div class="explore-summary">${parsed.summary}</div>`;
    }

    parsed.directions.forEach(dir => {
      html += `<div class="direction-card">`;
      html += `<div class="direction-title">${dir.title}</div>`;
      html += `<div class="direction-desc">${dir.description}</div>`;

      (dir.scholars || []).forEach(sch => {
        const wikiId = scholarWiki[sch.id] || '';
        html += `
          <div class="scholar-card" data-scholar-id="${sch.id}">
            <div class="scholar-avatar" data-wiki="${wikiId}">${(sch.nameZh || sch.id).charAt(0)}</div>
            <div class="scholar-info">
              <div class="scholar-name">${sch.nameZh || sch.id}</div>
              <div class="scholar-reason">${sch.reason || ''}</div>
            </div>
            <div class="scholar-arrow">→</div>
          </div>`;
      });

      html += `</div>`;
    });

    // 底部"直接查看全部学者"入口
    html += `<div class="explore-divider"></div>`;
    html += `<div class="explore-also" id="exploreViewAll">或者直接浏览全部学者地图 →</div>`;

    resultsEl.innerHTML = html;

    // 绑定学者卡片点击 → 跳转 map.html?scholar=xxx
    resultsEl.querySelectorAll('.scholar-card').forEach(card => {
      card.addEventListener('click', () => {
        exitPage('scholar', card.dataset.scholarId);
      });
    });

    // 绑定"查看全部"→ 跳转 map.html?search=xxx
    document.getElementById('exploreViewAll')?.addEventListener('click', () => {
      exitPage('search', query);
    });

    // 加载学者头像
    resultsEl.querySelectorAll('.scholar-avatar[data-wiki]').forEach(avatarEl => {
      const wikiId = avatarEl.dataset.wiki;
      if (!wikiId) return;
      fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiId)}`)
        .then(r => r.json())
        .then(d => {
          const url = d.thumbnail?.source;
          if (url) avatarEl.innerHTML = `<img src="${url}" alt="">`;
        }).catch(() => {});
    });

  } catch (err) {
    resultsEl.innerHTML = `<div class="explore-error">网络连接失败，请稍后重试</div>`;
  }

  isExploring = false;
}

// ════════════════════════════════════════════════════════════════════════════
// 5. EXIT ANIMATION — 离场并跳转
// ════════════════════════════════════════════════════════════════════════════
function exitPage(mode, param) {
  const page = document.getElementById('page');
  page.classList.add('exit');
  setTimeout(() => {
    if (mode === 'scholar' && param) {
      window.location.href = `map.html?scholar=${encodeURIComponent(param)}`;
    } else if (mode === 'search' && param) {
      window.location.href = `map.html?search=${encodeURIComponent(param)}`;
    } else if (mode === 'question' && param) {
      window.location.href = `map.html?question=${param}`;
    } else {
      window.location.href = 'map.html';
    }
  }, 700);
}

// ════════════════════════════════════════════════════════════════════════════
// 6. EVENT BINDINGS
// ════════════════════════════════════════════════════════════════════════════

// Pill 点击 → 调用 AI 探索
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const query = pill.dataset.q || pill.textContent.trim();
    searchInput.value = query;
    callExplore(query);
  });
});

// 搜索框 Enter → 调用 AI 探索
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const query = e.target.value.trim();
    if (query) callExplore(query);
  }
});

// 跳过按钮 → 直接进地图
document.getElementById('skipBtn').addEventListener('click', () => exitPage());
</script>
