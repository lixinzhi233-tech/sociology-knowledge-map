<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识宇宙 · 学者地图</title>
<style>
/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #050510;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  color: #fff;
}

/* ── BACKGROUND LAYERS ─────────────────────────────────────── */
#starsCanvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}
#nebulaLayer {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none; overflow: hidden;
}
.nebula {
  position: absolute; border-radius: 50%;
  filter: blur(80px);
  animation: nebulaPulse var(--dur, 14s) ease-in-out infinite alternate;
}
@keyframes nebulaPulse {
  from { transform: scale(1);    opacity: var(--opa-from, 0.08); }
  to   { transform: scale(1.12); opacity: var(--opa-to, 0.12); }
}

/* ── NAV ────────────────────────────────────────────────────── */
#navbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px; z-index: 100;
  background: rgba(6,6,16,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center;
  padding: 0 18px; gap: 14px;
}
#navLogo {
  font-size: 14px; color: #666;
  cursor: pointer; text-decoration: none;
  white-space: nowrap; flex-shrink: 0;
  transition: color 0.2s;
}
#navLogo:hover { color: #bbb; }
#navSearchWrap {
  position: relative; flex: 0 0 280px; margin: 0 auto;
}
#navSearchWrap svg {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); pointer-events: none;
}
#navSearch {
  width: 100%; height: 32px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 0 14px 0 34px;
  color: #aaa; font-size: 13px; font-family: inherit;
  outline: none; transition: all 0.2s;
}
#navSearch::placeholder { color: #383838; }
#navSearch:focus {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.14);
}
#navFilters { display: flex; gap: 5px; flex-shrink: 0; }
.filter-btn {
  height: 27px; padding: 0 13px;
  border-radius: 100px; border: none;
  background: transparent; color: #484848;
  font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.filter-btn:hover { color: #888; }
.filter-btn.active { background: rgba(255,255,255,0.1); color: #ddd; }

/* ── THREE-COLUMN APP LAYOUT ────────────────────────────────── */
#app {
  position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
  display: flex; z-index: 1;
}

/* ── LEFT DRAWER ────────────────────────────────────────────── */
#leftDrawer {
  width: 240px; flex-shrink: 0;
  background: rgba(6,6,18,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  transition: width 0.3s ease;
  z-index: 10;
}
#leftDrawer.collapsed { width: 32px; }
#leftToggleBtn {
  position: absolute; right: 0; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 52px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-right: none;
  border-radius: 6px 0 0 6px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  color: #444; font-size: 12px;
  transition: background 0.2s, color 0.2s;
  z-index: 11; flex-shrink: 0;
}
#leftToggleBtn:hover { background: rgba(255,255,255,0.08); color: #888; }
#leftDrawerContent {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  width: 222px;
  padding-bottom: 20px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.05) transparent;
  opacity: 1;
  transition: opacity 0.2s ease;
}
#leftDrawer.collapsed #leftDrawerContent {
  opacity: 0;
  pointer-events: none;
}
#leftDrawerContent::-webkit-scrollbar { width: 3px; }
#leftDrawerContent::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.05); border-radius: 2px;
}
.ld-section-header {
  padding: 14px 14px 8px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: #3a3a3a;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 4px; white-space: nowrap;
}
/* Left drawer sub-sections */
.ld-sub-label { padding: 10px 14px 5px; font-size: 10px; color: #3a3a3a; white-space: nowrap; }
.ld-sep { height: 1px; background: rgba(255,255,255,0.04); margin: 8px 0; }
/* Trajectory pills */
#trajectoryPills {
  padding: 2px 10px 8px;
  display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px;
}
.traj-pill {
  padding: 3px 9px; border-radius: 100px;
  font-size: 11px; cursor: pointer;
  transition: opacity 0.15s; opacity: 0.85; white-space: nowrap;
}
.traj-pill:hover { opacity: 1; }
.traj-empty-msg { font-size: 10px; color: #2e2e2e; padding: 4px; }
/* Global notes */
.global-notes-input {
  display: block; width: calc(100% - 20px); margin: 0 10px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px; padding: 8px;
  color: #777; font-size: 11px; font-family: inherit;
  line-height: 1.5; resize: none; min-height: 150px;
  outline: none; transition: border-color 0.2s;
}
.global-notes-input:focus { border-color: rgba(255,255,255,0.1); }
.global-notes-input::placeholder { color: #2a2a2a; }
.summary-wrap { padding: 8px 10px 0; }
.summary-btn {
  width: 100%; padding: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; color: #555;
  font-size: 11px; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
}
.summary-btn:hover { background: rgba(255,255,255,0.08); color: #aaa; }
/* Question items in right drawer (default state) */
.q-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: border-color 0.15s;
}
.q-item:hover .q-item-text { color: #ccc; }
.q-item.active-q { border-left-color: var(--q-color, #aaa); }
.q-item.active-q .q-item-text { color: #fff; }
.q-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.q-item-text { font-size: 12px; color: #777; line-height: 1.45; }
.q-custom-wrap { padding: 8px 12px 12px; }
#customQInput {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; padding: 7px 10px;
  color: #888; font-size: 12px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
#customQInput:focus { border-color: rgba(255,255,255,0.15); }
#customQInput::placeholder { color: #333; }
.q-detail-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  margin: 4px 0 8px;
}

/* ── CENTER MAP AREA ────────────────────────────────────────── */
#mapArea {
  flex: 1; position: relative; overflow: hidden; min-width: 0;
  display: flex; flex-direction: column;
}
#mapWrapper {
  flex: 1; position: relative; overflow: hidden;
  cursor: grab; min-height: 0;
}
#mapWrapper:active { cursor: grabbing; }
#worldMapSvg {
  position: absolute; inset: 0;
  z-index: 1; pointer-events: none;
  overflow: visible;
  opacity: 0;
}
#edgesSvg {
  position: absolute; inset: 0;
  z-index: 2; pointer-events: none;
  overflow: visible;
  opacity: 0;
}
#nodesContainer {
  position: absolute; inset: 0;
  z-index: 3; pointer-events: none;
}
#bubblesContainer {
  position: absolute; inset: 0;
  z-index: 4; pointer-events: none;
}
/* Active question floating pill */
#activeQBar {
  position: absolute; top: 10px; left: 50%;
  transform: translateX(-50%);
  background: rgba(8,8,24,0.92);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  padding: 6px 8px 6px 16px;
  display: none; align-items: center; gap: 8px;
  z-index: 20; white-space: nowrap;
  max-width: 85%;
}
#activeQText { font-size: 12px; color: #bbb; }
#exitQBtn {
  background: rgba(255,255,255,0.07); border: none;
  color: #777; font-size: 11px; font-family: inherit;
  cursor: pointer; padding: 3px 10px; border-radius: 100px;
  transition: all 0.2s;
}
#exitQBtn:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* ── SCHOLAR NODES ──────────────────────────────────────────── */
.scholar-node {
  position: absolute;
  width: 48px; height: 48px;
  transform: translate(-50%, -50%);
  cursor: pointer; pointer-events: all;
  z-index: 3;
  transition: opacity 0.4s ease;
}
.node-circle {
  width: 100%; height: 100%;
  border-radius: 50%; overflow: hidden;
  position: relative;
  background: #0d0d1c;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.3s ease, opacity 0.5s ease;
  filter: brightness(0.9) contrast(1.1);
}
.disc-soc .node-circle {
  border: 1.5px solid rgba(74,144,217,0.7);
  box-shadow: 0 0 0 1px rgba(74,144,217,0.15), 0 0 12px rgba(74,144,217,0.4),
    0 0 32px rgba(74,144,217,0.15), 0 0 80px rgba(74,144,217,0.06),
    inset 0 1px 0 rgba(255,255,255,0.1);
}
.disc-com .node-circle {
  border: 1.5px solid rgba(232,136,74,0.7);
  box-shadow: 0 0 0 1px rgba(232,136,74,0.15), 0 0 12px rgba(232,136,74,0.4),
    0 0 32px rgba(232,136,74,0.15), 0 0 80px rgba(232,136,74,0.06),
    inset 0 1px 0 rgba(255,255,255,0.1);
}
.disc-cross .node-circle {
  border: 1.5px solid rgba(155,111,212,0.7);
  box-shadow: 0 0 0 1px rgba(155,111,212,0.15), 0 0 12px rgba(155,111,212,0.4),
    0 0 32px rgba(155,111,212,0.15), 0 0 80px rgba(155,111,212,0.06),
    inset 0 1px 0 rgba(255,255,255,0.1);
}
.scholar-node:hover .node-circle { transform: scale(1.25) translateY(-3px); }
.disc-soc:hover .node-circle {
  box-shadow: 0 0 0 1px rgba(74,144,217,0.25), 0 0 18px rgba(74,144,217,0.6),
    0 0 48px rgba(74,144,217,0.22), 0 0 80px rgba(74,144,217,0.09),
    inset 0 1px 0 rgba(255,255,255,0.15);
}
.disc-com:hover .node-circle {
  box-shadow: 0 0 0 1px rgba(232,136,74,0.25), 0 0 18px rgba(232,136,74,0.6),
    0 0 48px rgba(232,136,74,0.22), 0 0 80px rgba(232,136,74,0.09),
    inset 0 1px 0 rgba(255,255,255,0.15);
}
.disc-cross:hover .node-circle {
  box-shadow: 0 0 0 1px rgba(155,111,212,0.25), 0 0 18px rgba(155,111,212,0.6),
    0 0 48px rgba(155,111,212,0.22), 0 0 80px rgba(155,111,212,0.09),
    inset 0 1px 0 rgba(255,255,255,0.15);
}
.scholar-node.selected .node-circle { transform: scale(1.45); }
.disc-soc.selected .node-circle  { animation: visionPulseSoc  2s ease-out infinite; }
.disc-com.selected .node-circle  { animation: visionPulseCom  2s ease-out infinite; }
.disc-cross.selected .node-circle{ animation: visionPulseCross 2s ease-out infinite; }
@keyframes visionPulseSoc {
  0%,100% { box-shadow: 0 0 0 1px rgba(74,144,217,0.25), 0 0 18px rgba(74,144,217,0.6),
    0 0 48px rgba(74,144,217,0.22), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 0 rgba(255,255,255,0.25); }
  50% { box-shadow: 0 0 0 1px rgba(74,144,217,0.25), 0 0 18px rgba(74,144,217,0.6),
    0 0 48px rgba(74,144,217,0.22), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 16px rgba(255,255,255,0); }
}
@keyframes visionPulseCom {
  0%,100% { box-shadow: 0 0 0 1px rgba(232,136,74,0.25), 0 0 18px rgba(232,136,74,0.6),
    0 0 48px rgba(232,136,74,0.22), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 0 rgba(255,255,255,0.25); }
  50% { box-shadow: 0 0 0 1px rgba(232,136,74,0.25), 0 0 18px rgba(232,136,74,0.6),
    0 0 48px rgba(232,136,74,0.22), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 16px rgba(255,255,255,0); }
}
@keyframes visionPulseCross {
  0%,100% { box-shadow: 0 0 0 1px rgba(155,111,212,0.25), 0 0 18px rgba(155,111,212,0.6),
    0 0 48px rgba(155,111,212,0.22), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 0 rgba(255,255,255,0.25); }
  50% { box-shadow: 0 0 0 1px rgba(155,111,212,0.25), 0 0 18px rgba(155,111,212,0.6),
    0 0 48px rgba(155,111,212,0.22), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 16px rgba(255,255,255,0); }
}
.node-avatar {
  width: 100%; height: 100%; object-fit: cover;
  display: none; position: absolute; inset: 0;
  filter: brightness(0.92) contrast(1.08);
}
.node-avatar.loaded { display: block; }
.node-initial {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.4);
  pointer-events: none;
}
.node-initial.hidden { display: none; }
.node-name {
  position: absolute; bottom: -20px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: rgba(255,255,255,0.6);
  white-space: nowrap; pointer-events: none;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  opacity: 0.7; transition: opacity 0.2s;
  letter-spacing: 0.02em;
}
.scholar-node:hover .node-name { opacity: 1; }
.scholar-node.selected .node-name,
.scholar-node.lit .node-name { opacity: 1; color: #fff; }
.scholar-node.dimmed { opacity: 0.06; }

/* ── EDGE FLOW ANIMATION ────────────────────────────────────── */
@keyframes flowLine {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -24; }
}
.edge-flow {
  stroke-dasharray: 8,4 !important;
  animation: flowLine 2s linear infinite;
}

/* ── NARRATIVE BUBBLES ──────────────────────────────────────── */
.narrative-bubble {
  position: absolute;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 8px 12px;
  font-size: 11px; color: #bbb; max-width: 180px;
  line-height: 1.55; pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  transform-origin: left center;
}
.narrative-bubble.faded  { opacity: 0.15; }
.narrative-bubble.focused { transform: scale(1.04); }
.narrative-bubble.arrow-left::before {
  content: ''; position: absolute; left: -5px; top: 50%;
  transform: translateY(-50%);
  border: 5px solid transparent; border-right-color: rgba(255,255,255,0.12);
}
.narrative-bubble.arrow-right::before {
  content: ''; position: absolute; right: -5px; top: 50%;
  transform: translateY(-50%);
  border: 5px solid transparent; border-left-color: rgba(255,255,255,0.12);
}
.narrative-bubble.arrow-bottom::before {
  content: ''; position: absolute; bottom: -5px; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: rgba(255,255,255,0.12);
}

/* ── TIME RANGE BAR ─────────────────────────────────────────── */
#timeRangeBar {
  height: 48px; flex-shrink: 0;
  background: rgba(6,6,18,0.88);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  position: relative; user-select: none;
  display: flex; align-items: center; padding: 0 20px;
}
#timeRangeTrack {
  position: relative; flex: 1; height: 3px;
  background: rgba(255,255,255,0.08); border-radius: 2px;
}
#timeRangeHighlight {
  position: absolute; top: 0; height: 100%;
  background: rgba(74,144,217,0.5); border-radius: 2px;
  pointer-events: none;
}
.tr-handle {
  position: absolute; top: 50%; width: 14px; height: 14px;
  background: #4A90D9; border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: grab; transition: transform 0.1s; z-index: 2;
}
.tr-handle:hover, .tr-handle.dragging { transform: translate(-50%,-50%) scale(1.3); cursor: grabbing; }
.tr-label {
  position: absolute; top: -18px;
  transform: translateX(-50%);
  font-size: 10px; color: #4A90D9;
  white-space: nowrap; pointer-events: none;
}

/* ── RIGHT DRAWER (always visible flex child) ───────────────── */
#rightDrawer {
  width: 300px; flex-shrink: 0;
  background: rgba(6,6,18,0.96);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-left: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: row;
  overflow: hidden;
  position: relative;
  transition: width 0.3s ease;
}
#rightDrawer.collapsed { width: 32px; }
#rightToggleBtn {
  position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 52px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-left: none;
  border-radius: 0 6px 6px 0;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  color: #444; font-size: 12px;
  transition: background 0.2s, color 0.2s;
  z-index: 11; flex-shrink: 0;
}
#rightToggleBtn:hover { background: rgba(255,255,255,0.08); color: #888; }
#rightDrawerContent {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
  opacity: 1; transition: opacity 0.2s ease;
}
#rightDrawer.collapsed #rightDrawerContent {
  opacity: 0; pointer-events: none;
}
#rdHeader {
  padding: 14px 14px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center;
  gap: 10px; flex-shrink: 0;
}
#rdTitle { flex: 1; font-size: 12px; color: #444; letter-spacing: 0.05em; text-transform: uppercase; }
#rdBackBtn {
  background: none; border: none;
  color: #484848; font-size: 16px; line-height: 1;
  cursor: pointer; padding: 2px 6px;
  transition: color 0.2s; flex-shrink: 0;
  display: none;
}
#rdBackBtn.visible { display: block; }
#rdBackBtn:hover { color: #bbb; }
#rdContent {
  flex: 1; overflow-y: auto; padding: 0;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.05) transparent;
}
#rdContent.detail-mode { padding: 16px; }
#rdContent::-webkit-scrollbar { width: 3px; }
#rdContent::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.05); border-radius: 2px;
}
#rdFooter {
  padding: 12px 16px;
  background: rgba(6,6,18,0.9);
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
#chatBtn {
  width: 100%; padding: 12px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 10px; color: #ccc;
  font-size: 14px; font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
  transition: all 0.2s;
}
#chatBtn:hover {
  background: rgba(255,255,255,0.13); color: #fff;
  box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: translateY(-1px);
}

/* ── PANEL CONTENT ──────────────────────────────────────────── */
.panel-empty {
  padding-top: 60px; text-align: center;
  font-size: 13px; color: #383838; line-height: 1.7;
}
.sch-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
.sch-avatar {
  width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
  background: #141426; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.35);
  border: 1.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
}
.sch-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sch-meta { flex: 1; min-width: 0; }
.sch-name-zh { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 3px; }
.sch-name-en { font-size: 11px; color: #484848; line-height: 1.3; margin-bottom: 4px; word-break: break-word; }
.sch-years   { font-size: 11px; color: #3a3a3a; }
.disc-tags   { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }

function mapDimensions() {

// 1. STARS
// ═══════════════════════════════════════════════════════════════════
function initStars() {
  const canvas = $('starsCanvas');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  const stars = Array.from({ length: 300 }, () => ({
    x:  Math.random() * window.innerWidth,
    y:  Math.random() * window.innerHeight,
    r:  Math.random() * 1.5 + 0.5,
    vx: (Math.random() > .5 ? 1 : -1) * (Math.random() * 0.05 + 0.03),
    vy: (Math.random() > .5 ? 1 : -1) * (Math.random() * 0.05 + 0.03),
    a:  Math.random() * 0.14 + 0.04
  }));
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.x += s.vx; s.y += s.vy;
      if (s.x <= 0 || s.x >= canvas.width)  s.vx *= -1;
      if (s.y <= 0 || s.y >= canvas.height) s.vy *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
}

async function initWorldMap() {

    .translate([W / 2, H / 2]);

    const world = await res.json();
    const countries = topojson.feature(world, world.objects.countries);
    const pathGen = d3.geoPath().projection(projection);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.id = 'worldMapGroup';

    countries.features.forEach(f => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', pathGen(f) || '');

// 3. NODE POSITIONS
// ═══════════════════════════════════════════════════════════════════
function computeNodePositions() {
  const { W, H } = mapDimensions();
  const PAD = 60;

  let pos = scholars.map(s => {
    let x = PAD + Math.random() * (W - PAD * 2);
    let y = PAD + Math.random() * (H - PAD * 2);
    if (projection) {
      const pt = projection([s.lng, s.lat]);
      if (pt && isFinite(pt[0]) && isFinite(pt[1])) { [x, y] = pt; }
    }
    return { id: s.id, x, y, origX: x, origY: y };
  });

  const MIN = 65, ITER = 80;
  for (let it = 0; it < ITER; it++) {
    let moved = false;
    for (let a = 0; a < pos.length; a++) {
      for (let b = a + 1; b < pos.length; b++) {
        const dx = pos[b].x - pos[a].x;
        const dy = pos[b].y - pos[a].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < MIN) {
          const len = Math.max(d, 0.5);
          const f   = (MIN - d) / len * 0.55;
          const rx  = d < 0.5 ? (Math.random() - .5) : dx / len;
          const ry  = d < 0.5 ? (Math.random() - .5) : dy / len;
          pos[a].x -= rx * f; pos[a].y -= ry * f;
          pos[b].x += rx * f; pos[b].y += ry * f;
          // 锚点弹簧：推开后向原始投影位置回弹
          pos[a].x += (pos[a].origX - pos[a].x) * 0.15;
          pos[a].y += (pos[a].origY - pos[a].y) * 0.15;
          pos[b].x += (pos[b].origX - pos[b].x) * 0.15;
          pos[b].y += (pos[b].origY - pos[b].y) * 0.15;
          moved = true;
        }
      }
    }
    pos.forEach(p => {
      p.x = Math.max(PAD, Math.min(W - PAD, p.x));
      p.y = Math.max(PAD, Math.min(H - PAD, p.y));
    });
    if (!moved) break;
  }
  pos.forEach(p => { nodePositions[p.id] = { x: p.x, y: p.y }; });
}

// 4. RENDER EDGES
// ═══════════════════════════════════════════════════════════════════
function renderEdges() {
  const { W, H } = mapDimensions();
  const svg = $('edgesSvg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#4A90D9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:0.1"/>
    </linearGradient>`;
  svg.appendChild(defs);

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'edgesGroup';

  relationships.forEach(rel => {
    const a = nodePositions[rel.from];
    const b = nodePositions[rel.to];
    if (!a || !b) return;
    const cfg = edgeCfg[rel.type] || edgeCfg.influence;
    const midX = (a.x + b.x) / 2;
    const midY = (a.y + b.y) / 2 - Math.abs(b.x - a.x) * 0.15;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${a.x},${a.y} Q ${midX},${midY} ${b.x},${b.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', cfg.stroke);
    path.setAttribute('stroke-width', cfg.width);
    path.setAttribute('stroke-dasharray', cfg.dash);
    path.setAttribute('stroke-opacity', cfg.opacity);
    if (rel.type === 'influence') path.setAttribute('filter', 'url(#glow)');
    path.dataset.from = rel.from;
    path.dataset.to   = rel.to;
    path.dataset.type = rel.type;
    g.appendChild(path);
    edgeElements.push({ el: path, from: rel.from, to: rel.to, type: rel.type });
  });
  svg.appendChild(g);
}

// 6. D3 ZOOM
// ═══════════════════════════════════════════════════════════════════
let zoomBehavior = null;

function initZoom() {
  const { W, H } = mapDimensions();

  zoomBehavior = d3.zoom()
    .scaleExtent([0.8, 6])
    .on('zoom', onZoom);

  d3.select('#mapWrapper').call(zoomBehavior);

  // Initial transform: 1.8x centered on Europe+North America
  if (projection) {
    const focalPt = projection([-5, 48]);
    if (focalPt) {
      const k = 1.8;
      const tx = W / 2 - focalPt[0] * k;
      const ty = H / 2 - focalPt[1] * k;
      const initTransform = d3.zoomIdentity.translate(tx, ty).scale(k);
      d3.select('#mapWrapper').call(zoomBehavior.transform, initTransform);
    }
  }
}

function onZoom(event) {
  const { x, y, k } = event.transform;
  currentZoomTransform = event.transform;

  // Update SVG group transforms
  const mapGroup = $('worldMapGroup');
  if (mapGroup) mapGroup.setAttribute('transform', `translate(${x},${y}) scale(${k})`);

  const edgeGroup = $('edgesGroup');
  if (edgeGroup) edgeGroup.setAttribute('transform', `translate(${x},${y}) scale(${k})`);

  // Update each node's position (not scale - nodes stay same size)
  Object.entries(nodePositions).forEach(([id, pos]) => {
    const el = nodeElements[id];
    if (!el) return;
    const sx = pos.x * k + x;
    const sy = pos.y * k + y;
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
  });

  // Reposition bubbles
  const { W: mapW } = mapDimensions();
  Object.entries(bubbleElements).forEach(([id, bubble]) => {
    const pos = nodePositions[id];
    if (!pos) return;
    const sx = pos.x * k + x;
    const sy = pos.y * k + y;
    positionBubble(bubble, { x: sx, y: sy }, mapW);
  });
}

async function loadAvatar(id, imgEl, initEl) {
  const s = scholarById(id);

  try {
    const r = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(s.wikipediaId)}`
    );
    const d = await r.json();
    const url = d.thumbnail?.source;
    if (!url) return;
    imgEl.src = url;
    imgEl.onload = () => {
      imgEl.classList.add('loaded');
      initEl.classList.add('hidden');
    };
  } catch { /* keep initial */ }
}

// 9. NODE CLICK / SELECT SCHOLAR
// ═══════════════════════════════════════════════════════════════════
function selectScholar(id) {
  const s = scholarById(id);
  if (!s) return;

  // Deselect previous
  if (selectedScholarId && nodeElements[selectedScholarId]) {
    nodeElements[selectedScholarId].classList.remove('selected');
  }
  selectedScholarId = id;
  nodeElements[id]?.classList.add('selected');

  // Pan map to center on node
  const pos = nodePositions[id];
  if (pos && zoomBehavior) {
    const wrapper = document.getElementById('mapWrapper');
    const wW = wrapper.clientWidth, wH = wrapper.clientHeight;
    const scale = currentZoomTransform.k;
    const tx = wW / 2 - pos.x * scale;
    const ty = wH / 2 - pos.y * scale;
    d3.select('#mapWrapper')
      .transition().duration(500)
      .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  // Bubble focus if question active
  if (activeQuestionKey) {
    Object.entries(bubbleElements).forEach(([bid, bel]) => {
      bel.classList.toggle('faded',   bid !== id);
      bel.classList.toggle('focused', bid === id);
    });
  }

  addToTrajectory(id);
  showScholarDetail(id);
}

function onNodeClick(id) { selectScholar(id); }

  const collabs      = relationships.filter(r =>
    (r.from === id || r.to === id) && r.type === 'collaboration'
  ).map(r => r.from === id ? r.to : r.from);

  function chipsHtml(ids) {
    return ids.filter(tid => scholarById(tid)).map(tid => {

      return `<span class="scholar-chip" data-id="${tid}">${ts.nameZh}</span>`;

  const relHtml = [
    influences.length   ? `<div class="relation-row"><span class="relation-label">影响了</span>${chipsHtml(influences)}</div>` : '',
    influencedBy.length ? `<div class="relation-row"><span class="relation-label">受影响于</span>${chipsHtml(influencedBy)}</div>` : '',
    critiques.length    ? `<div class="relation-row"><span class="relation-label">批判了</span>${chipsHtml(critiques)}</div>` : '',
    collabs.length      ? `<div class="relation-row"><span class="relation-label">合作者</span>${chipsHtml(collabs)}</div>` : ''
  ].filter(Boolean).join('');

  content.innerHTML = `
    <div class="sch-header">
      <div class="sch-avatar" id="panelAvatar">${s.nameZh.charAt(0)}</div>
      <div class="sch-meta">
        <div class="sch-name-zh">${s.nameZh}</div>
        <div class="sch-name-en">${s.name}</div>
        <div class="sch-years">${s.birthYear} — ${death}</div>
      </div>
    </div>
    <div class="disc-tags">${discHtml}</div>
    <div class="p-sep"></div>
    <div class="p-section">
      <div class="sec-label">核心概念</div>
      <div class="concept-tags">${conceptHtml}</div>
    </div>
    <div class="p-sep"></div>
    <div class="p-section">
      <div class="sec-label">代表著作</div>
      <ul class="works-list">${worksHtml}</ul>
    </div>
    ${s.timeContext ? `<div class="p-sep"></div>
    <div class="p-section">
      <span class="info-label">时代背景</span>
      <div class="info-block">${s.timeContext}</div>
    </div>` : ''}
    ${s.keyDebate ? `<div class="p-sep"></div>
    <div class="p-section">
      <span class="info-label">核心争论</span>
      <div class="info-block">${s.keyDebate}</div>
    </div>` : ''}
    ${s.furtherReading ? `<div class="p-sep"></div>
    <div class="p-section">
      <span class="info-label">延伸阅读</span>
      <div class="info-block reading-text">${formatReading(s.furtherReading)}</div>
    </div>` : ''}
    ${relHtml ? `<div class="p-sep"></div>
    <div class="p-section">
      <div class="sec-label">学术关系</div>
      ${relHtml}
    </div>` : ''}
  `;
  content.scrollTop = 0;
  $('rdFooter').style.display = '';

  if (s.wikipediaId) {
    fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(s.wikipediaId)}`)
      .then(r => r.json())
      .then(d => {
        const url = d.thumbnail?.source;
        const el = $('panelAvatar');
        if (url && el) el.innerHTML = `<img src="${url}" alt="${s.nameZh}">`;
      }).catch(() => {});
  }

  content.querySelectorAll('.scholar-chip').forEach(chip => {
    chip.addEventListener('click', () => selectScholar(chip.dataset.id));
  });

}

function formatReading(text) {
  return text.replace(/(《[^》]+》)/, '<strong>$1</strong>');
}

function triggerQuestion(key) {
  const q = questionMap[key];
  if (!q) return;

  if (activeQuestionKey && activeQuestionKey !== key) clearQuestion(false);
  activeQuestionKey = key;
  const relatedSet = new Set(q.scholars);

  scholars.forEach(s => {
    const el = nodeElements[s.id];
    if (!el) return;
    el.classList.toggle('dimmed', !relatedSet.has(s.id));
    el.classList.toggle('lit',     relatedSet.has(s.id));
  });

  edgeElements.forEach(({ el, from, to, type }) => {
    const rel = relatedSet.has(from) && relatedSet.has(to);
    el.setAttribute('stroke-opacity', rel ? '0.75' : '0.04');
    if (rel) {
      el.setAttribute('stroke-width', ((edgeCfg[type]?.width || 1) * 2).toString());
      el.classList.add('edge-flow');
    } else {
      el.setAttribute('stroke-width', (edgeCfg[type]?.width || 1).toString());
      el.classList.remove('edge-flow');
    }
  });

  clearBubbles();
  const { W } = mapDimensions();
  const { x, y, k } = currentZoomTransform;
  q.narrative.forEach(item => {
    const pos = nodePositions[item.id];
    if (!pos) return;
    const sx = pos.x * k + x;
    const sy = pos.y * k + y;
    const bubble = createBubble(item.text, { x: sx, y: sy }, W);
    $('bubblesContainer').appendChild(bubble);
    bubbleElements[item.id] = bubble;
  });

  $('activeQText').textContent = q.label;
  $('activeQBar').style.display = 'flex';

  // Update right drawer: question list + scholar cards
  $('rdTitle').textContent = '问题探索';
  $('rdBackBtn').classList.remove('visible');
  $('rdContent').classList.remove('detail-mode');
  $('rdFooter').style.display = 'none';
  renderQuestionContent(key);
}

function createBubble(text, screenPos, mapW) {
  const bubble = document.createElement('div');
  bubble.className = 'narrative-bubble';
  bubble.textContent = text;
  positionBubble(bubble, screenPos, mapW);
  return bubble;
}

function positionBubble(bubble, pos, mapW) {
  const BUBBLE_W = 180, NODE_R = 28;
  const mapRight = mapW - 10;

  // Remove old arrow classes
  bubble.classList.remove('arrow-left', 'arrow-right', 'arrow-bottom');

  if (pos.x + NODE_R + BUBBLE_W < mapRight) {
    bubble.classList.add('arrow-left');
    bubble.style.left = (pos.x + NODE_R + 6) + 'px';
    bubble.style.top  = (pos.y - 20) + 'px';
  } else if (pos.x - NODE_R - BUBBLE_W > 10) {
    bubble.classList.add('arrow-right');
    bubble.style.left = (pos.x - NODE_R - BUBBLE_W - 6) + 'px';
    bubble.style.top  = (pos.y - 20) + 'px';
  } else {
    bubble.classList.add('arrow-bottom');
    bubble.style.left    = (pos.x - BUBBLE_W / 2) + 'px';
    bubble.style.top     = (pos.y - NODE_R - 68) + 'px';
    bubble.style.maxWidth = BUBBLE_W + 'px';
  }
}

function clearBubbles() {
  Object.values(bubbleElements).forEach(el => el.remove());
  Object.keys(bubbleElements).forEach(k => delete bubbleElements[k]);
}

function clearQuestion(resetUI = true) {
  activeQuestionKey = null;
  clearBubbles();

  scholars.forEach(s => {
    const el = nodeElements[s.id];
    if (!el) return;
    el.classList.remove('dimmed', 'lit');
    applyFilterToNode(s);
  });

  edgeElements.forEach(({ el, type }) => {
    const cfg = edgeCfg[type] || edgeCfg.influence;
    el.setAttribute('stroke-opacity', cfg.opacity);
    el.setAttribute('stroke-width', cfg.width);
    el.setAttribute('stroke-dasharray', cfg.dash || '');
    el.classList.remove('edge-flow');
  });

  if (resetUI) {
    $('activeQBar').style.display = 'none';
    showQuestions();
  }
}

// QUESTION CONTENT (right drawer default state)
// ═══════════════════════════════════════════════════════════════════
function renderQuestionContent(activeKey) {
  const content = $('rdContent');
  content.scrollTop = 0;

  // Question list items
  let html = Object.entries(questionMap).map(([key, q]) => {
    const isActive = activeKey === key;
    return `<div class="q-item${isActive ? ' active-q' : ''}" data-key="${key}" style="--q-color:${q.color}">
      <div class="q-item-dot" style="background:${q.color}"></div>
      <div class="q-item-text">${q.label}</div>
    </div>`;
  }).join('');

  // Custom question input at bottom of list
  html += `<div class="q-custom-wrap"><input id="customQInput" type="text" placeholder="你在好奇什么？" autocomplete="off"></div>`;

  // Scholar narrative cards if a question is active
  if (activeKey && questionMap[activeKey]) {
    const q = questionMap[activeKey];
    html += `<div class="q-detail-divider"></div>`;
    html += q.narrative.map(item => {
      const s = scholarById(item.id);
      if (!s) return '';
      return `<div class="q-scholar-card" data-id="${s.id}">
        <div class="q-sch-avatar" data-wid="${s.wikipediaId || ''}">${s.nameZh.charAt(0)}</div>
        <div class="q-sch-info">
          <div class="q-sch-name">${s.nameZh}</div>
          <div class="q-sch-narrative">${item.text}</div>
        </div>
      </div>`;
    }).join('');
  }

  content.innerHTML = html;

  // q-item clicks: toggle question
  content.querySelectorAll('.q-item').forEach(item => {
    item.addEventListener('click', () => {
      if (activeQuestionKey === item.dataset.key) {
        clearQuestion(true);
      } else {
        triggerQuestion(item.dataset.key);
      }
    });
  });

  // Custom question input
  const ci = $('customQInput');
  if (ci) {
    ci.addEventListener('keydown', async e => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        const q = e.target.value.trim();
        e.target.value = '';
        await handleCustomQuestion(q);
      }
    });
  }

  // Scholar card clicks + avatar loading
  content.querySelectorAll('.q-scholar-card').forEach(card => {
    card.addEventListener('click', () => selectScholar(card.dataset.id));
    const avatarEl = card.querySelector('.q-sch-avatar');
    const wid = avatarEl?.dataset.wid;
    if (wid) {
      fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wid)}`)
        .then(r => r.json())
        .then(d => {
          const url = d.thumbnail?.source;
          if (url && avatarEl) avatarEl.innerHTML = `<img src="${url}" alt="">`;
        }).catch(() => {});
    }
  });
}

function addCustomQuestion(text) {
  const content = $('rdContent');
  // Insert custom item at top
  const customItem = document.createElement('div');
  customItem.className = 'q-item active-q';
  customItem.style.setProperty('--q-color', '#aaa');
  customItem.innerHTML = `<div style="font-size:12px;color:#888;flex-shrink:0;margin-top:2px">✦</div>
    <div class="q-item-text" style="color:#fff">${text}</div>`;
  content.insertBefore(customItem, content.firstChild);

  // Highlight all scholars (no discipline limit)
  scholars.forEach(s => {
    const el = nodeElements[s.id];
    if (!el) return;
    el.classList.remove('dimmed');
    el.classList.add('lit');
  });
  edgeElements.forEach(({ el, type }) => {
    const cfg = edgeCfg[type] || edgeCfg.influence;
    el.setAttribute('stroke-opacity', '0.5');
  });

  $('activeQText').textContent = text;
  $('activeQBar').style.display = 'flex';
}

function addToTrajectory(scholarId) {
  const s = scholarById(scholarId);
  if (!s) return;
  if (thoughtTrajectory.length > 0 && thoughtTrajectory[0].id === scholarId) return;
  thoughtTrajectory.unshift({ id: scholarId, name: s.nameZh });

function applyFilterToNode(s) {
  const el = nodeElements[s.id];
  if (!el || activeQuestionKey) return;
  el.style.pointerEvents = '';
  const visible = activeFilter === 'all' || s.disciplines.includes(activeFilter);
  el.style.opacity = visible ? '' : '0.07';
}

function applyFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === filter)
  );
  scholars.forEach(s => applyFilterToNode(s));
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
});

$('navSearch').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  scholars.forEach(s => {
    const el = nodeElements[s.id];
    if (!el || activeQuestionKey) return;
    if (!q) { applyFilterToNode(s); return; }
    const match =
      s.nameZh.toLowerCase().includes(q) ||
      s.name.toLowerCase().includes(q)   ||
      s.coreConcepts.some(c => c.toLowerCase().includes(q));
    el.style.opacity = match ? '1' : '0.06';
  });
});

$('navSearch').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const query = e.target.value.trim();
  if (!query) return;
  await handleCustomQuestion(query);
});

async function handleCustomQuestion(query) {
  // Show loading state in right drawer
  showQuestions();
  $('rdTitle').textContent = '语义搜索';
  $('rdContent').innerHTML = `<div style="padding:20px;color:#555;font-size:13px">正在分析「${query}」…</div>`;

  try {
    const resp = await fetch(`${API_BASE}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, scholars })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '';
    let parsed;
    try { parsed = JSON.parse(raw); } catch { parsed = null; }

    if (parsed?.results?.length) {
      // Highlight matching nodes on map
      const matchIds = new Set(parsed.results.map(r => r.id));
      scholars.forEach(s => {
        const el = nodeElements[s.id];
        if (el) el.style.opacity = matchIds.has(s.id) ? '1' : '0.06';
      });

      // Render results in right drawer
      const rows = parsed.results.map(r => {
        const s = scholarById(r.id);
        const color = s ? discColor(s) : '#666';
        return `<div class="summary-scholar-row" data-id="${r.id}" style="cursor:pointer">
          <div class="summary-dot" style="background:${color}"></div>
          <div>
            <div class="summary-scholar-name">${s?.nameZh || r.id}</div>
            <div class="summary-scholar-relevance">${r.relevance}</div>
          </div>
        </div>`;
      }).join('');
      $('rdContent').innerHTML = `<div style="padding:10px 16px 4px;font-size:11px;color:#3a3a3a;text-transform:uppercase;letter-spacing:.08em">「${query}」相关学者</div>${rows}`;

      $('rdContent').querySelectorAll('.summary-scholar-row').forEach(row => {
        row.addEventListener('click', () => selectScholar(row.dataset.id));
      });
    } else {
      $('rdContent').innerHTML = `<div style="padding:20px;color:#555;font-size:13px">${raw || '未找到相关学者。'}</div>`;
    }
  } catch {
    $('rdContent').innerHTML = `<div style="padding:20px;color:#555;font-size:13px">连接失败，请确认 server.js 已启动。</div>`;
  }
}

// 17. TIME RANGE BAR
// ═══════════════════════════════════════════════════════════════════
const TIME_MIN = 1800, TIME_MAX = 2025;
let timeRangeL = TIME_MIN, timeRangeR = TIME_MAX;

function applyTimeFilter() {
  scholars.forEach(s => {
    const el = nodeElements[s.id];
    if (!el) return;
    const alive = s.birthYear <= timeRangeR && (s.deathYear || 2025) >= timeRangeL;
    el.style.opacity = alive ? '' : '0.08';
    el.style.pointerEvents = alive ? '' : 'none';
  });

  // Edges
  edgeElements.forEach(({ el, from, to }) => {
    const fs = scholarById(from), ts = scholarById(to);
    const fv = fs && fs.birthYear <= timeRangeR && (fs.deathYear || 2025) >= timeRangeL;
    const tv = ts && ts.birthYear <= timeRangeR && (ts.deathYear || 2025) >= timeRangeL;
    el.style.opacity = (fv && tv) ? '' : '0.03';
  });
}

function initTimeRangeBar() {
  const track = $('timeRangeTrack');
  const highlight = $('timeRangeHighlight');
  const handleL = $('trHandleL');
  const handleR = $('trHandleR');
  const labelL = $('trLabelL');
  const labelR = $('trLabelR');

  function yearToFrac(y) { return (y - TIME_MIN) / (TIME_MAX - TIME_MIN); }
  function fracToYear(f) { return Math.round(TIME_MIN + f * (TIME_MAX - TIME_MIN)); }

  function updateVisuals() {
    const lf = yearToFrac(timeRangeL);
    const rf = yearToFrac(timeRangeR);
    handleL.style.left = (lf * 100) + '%';
    handleR.style.left = (rf * 100) + '%';
    highlight.style.left = (lf * 100) + '%';
    highlight.style.width = ((rf - lf) * 100) + '%';
    labelL.textContent = timeRangeL;
    labelR.textContent = timeRangeR;
  }

  function startDrag(handle, isLeft) {
    handle.classList.add('dragging');
    const rect = track.getBoundingClientRect();

    function onMove(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      let frac = (clientX - rect.left) / rect.width;
      frac = Math.max(0, Math.min(1, frac));
      const year = fracToYear(frac);
      if (isLeft) {
        timeRangeL = Math.min(year, timeRangeR - 10);
      } else {
        timeRangeR = Math.max(year, timeRangeL + 10);
      }
      updateVisuals();
      applyTimeFilter();
    }

    function onUp() {
      handle.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('touchend', onUp);
  }

  handleL.addEventListener('mousedown', e => { e.preventDefault(); startDrag(handleL, true); });
  handleR.addEventListener('mousedown', e => { e.preventDefault(); startDrag(handleR, false); });
  handleL.addEventListener('touchstart', e => startDrag(handleL, true), { passive: true });
  handleR.addEventListener('touchstart', e => startDrag(handleR, false), { passive: true });

  updateVisuals();
}

// ═══════════════════════════════════════════════════════════════════
// 18. URL PARAMS
// ═══════════════════════════════════════════════════════════════════
function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const initialQuestion = params.get('question');
  if (initialQuestion && questionMap[initialQuestion]) {
    setTimeout(() => triggerQuestion(initialQuestion), 700);
  }

  const searchQuery = params.get('search');
  if (searchQuery) {
    setTimeout(() => handleCustomQuestion(searchQuery), 700);
  }
}

}

// ═══════════════════════════════════════════════════════════════════
// 20. CHAT (inline in right drawer)
// ═══════════════════════════════════════════════════════════════════
let chatHistory = []; // [{role, content}]
let chatScholarId = null;

function buildPersonaPrompt(s) {
  if (s.personaPrompt) return s.personaPrompt;
  return `你是${s.nameZh}(${s.name})，${s.school}的代表人物。用第一人称回答问题，结合你的核心理论：${s.coreConcepts.join('、')}。用中文回答，简洁但有深度，控制在200字以内。`;
}

$('chatBtn').addEventListener('click', () => {
  const s = scholarById(selectedScholarId);
  if (!s) return;
  chatScholarId = selectedScholarId;
  chatHistory = [];

  // Set modal header
  $('chatScholarName').textContent = `与${s.nameZh}对话`;
  const avatarEl = $('chatScholarAvatar');
  const nodeImg = nodeElements[s.id]?.querySelector('.node-avatar.loaded');
  if (nodeImg) {
    avatarEl.innerHTML = `<img src="${nodeImg.src}" alt="">`;
  } else {
    avatarEl.innerHTML = s.nameZh.charAt(0);
  }

  // Open modal
  $('chatMessages').innerHTML = `<div class="chat-msg assistant" style="color:#484848;text-align:center;background:none;">开始与${s.nameZh}对话，试试问TA关于「${s.coreConcepts[0]}」的问题…</div>`;
  $('chatModal').classList.add('open');
  $('chatInput').focus();
});

$('chatCloseBtn').addEventListener('click', () => {
  $('chatModal').classList.remove('open');
});
$('chatModal').addEventListener('click', e => {
  if (e.target === $('chatModal')) $('chatModal').classList.remove('open');
});

async function sendChat() {
  const input = $('chatInput');
  const msg = input.value.trim();
  if (!msg || !chatScholarId) return;
  input.value = '';

  const s = scholarById(chatScholarId);
  chatHistory.push({ role: 'user', content: msg });

  appendChatMessage('user', msg);
  appendChatMessage('assistant', '思考中…', true);

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        scholarId: chatScholarId,
        personaPrompt: buildPersonaPrompt(s),
        messages: chatHistory
      })
    });
    const data = await res.json();
    console.log('Chat API response:', data);

    // Handle different response formats
    let reply = '';
    if (data.content && Array.isArray(data.content)) {
      reply = data.content.map(b => b.text || '').join('');
    } else if (data.error) {
      reply = `API错误: ${data.error.message || JSON.stringify(data.error)}`;
    } else {
      reply = '返回格式异常，请检查 server.js 和 API key';
    }

    if (!reply) reply = '抱歉，我暂时无法回答。';
    chatHistory.push({ role: 'assistant', content: reply });
    removeLoadingMessage();
    appendChatMessage('assistant', reply);
  } catch (e) {
    console.error('Chat error:', e);
    removeLoadingMessage();
    appendChatMessage('assistant', '网络错误，请确认 server.js 正在运行。');
  }
}

function appendChatMessage(role, text, isLoading = false) {
  const container = $('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  if (isLoading) div.classList.add('chat-loading');
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeLoadingMessage() {
  $('chatMessages')?.querySelector('.chat-loading')?.remove();
}

$('chatSendBtn').addEventListener('click', sendChat);
$('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendChat(); }
});

// ═══════════════════════════════════════════════════════════════════
// 21. SUMMARY MODAL (语义搜索 → 探索关联)
// ═══════════════════════════════════════════════════════════════════
async function openSummary() {
  if (exploredScholars.length === 0) {
    alert('请先点击几位学者进行探索，再生成总结。');
    return;
  }

  $('summaryModal').classList.add('open');
  $('summaryBody').innerHTML = '<div style="padding:20px;color:#555;font-size:13px">正在分析你的探索轨迹…</div>';

  const explored = exploredScholars.map(id => scholarById(id)).filter(Boolean);
  const names = explored.map(s => s.nameZh).join('、');
  const query = `我探索了这些学者：${names}。请找出他们之间最核心的思想关联，以及这次探索揭示了哪些学术脉络。`;

  try {
    const resp = await fetch(`${API_BASE}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, scholars })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '';
    let parsed;
    try { parsed = JSON.parse(raw); } catch { parsed = null; }

    if (parsed?.results?.length) {
      const rows = parsed.results.map(r => {
        const s = scholarById(r.id);
        const color = s ? discColor(s) : '#666';
        return `<div class="summary-scholar-row">
          <div class="summary-dot" style="background:${color}"></div>
          <div>
            <div class="summary-scholar-name">${s?.nameZh || r.id}</div>
            <div class="summary-scholar-relevance">${r.relevance}</div>
          </div>
        </div>`;
      }).join('');
      $('summaryBody').innerHTML = rows;
    } else {
      $('summaryBody').innerHTML = `<div style="padding:20px;color:#666;font-size:13px">${raw || '暂无结果。'}</div>`;
    }
  } catch {
    $('summaryBody').innerHTML = '<div style="padding:20px;color:#555;font-size:13px">连接失败，请确认 server.js 已启动。</div>';
  }
}

$('summaryCloseBtn')?.addEventListener('click', () => $('summaryModal')?.classList.remove('open'));
$('summaryModal')?.addEventListener('click', e => { if (e.target === $('summaryModal')) $('summaryModal')?.classList.remove('open'); });

window.addEventListener('DOMContentLoaded', init);
</script>

    </div>
    <div id="summaryBody"></div>

</div>
